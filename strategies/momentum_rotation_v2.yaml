strategy_id: momentum_rotation_v2
description: "momentum_rotation_v1 with the low-vol/value weight CUT to stop mechanically\
  \ filtering out high-momentum semis. momentum 0.42\u21920.50, low_volatility 0.16\u2192\
  0.08, value 0.14\u21920.08, quality kept at 0.22 (junk-momentum crash filter that\
  \ doesn't penalize leaders). Weighting switched inverse_vol\u2192score_proportional\
  \ (removes a low-vol SIZING tilt that was dragging book beta to ~0.1); portfolio\
  \ risk is now controlled at the book level by vol_target instead. Leadership-capture\
  \ tilt; re-arms the momentum crash tail \u2014 backtest drawdown/turnover/semi-exposure.\n"
universe:
  source: av_listing
  min_price: 5.0
  min_avg_dollar_volume_20d: 20000000
factor_engine:
  momentum_short_window: 21
  momentum_long_window: 252
  volatility_window: 252
  liquidity_window: 20
  pe_pb_cap: 50.0
  spy_price_lookback_days: 600
  quality_use_gross_profitability: true
  momentum_method: residual
  momentum_blend_windows:
  - 252
  - 126
regime_detection:
  slow_sma: 200
  vol_window: 20
  vol_threshold: 0.2
  confirmation_days: 5
  regimes:
    bull_calm:
      spy_above_slow_sma: true
      vol_above_threshold: false
    bull_stress:
      spy_above_slow_sma: true
      vol_above_threshold: true
    bear_stress:
      spy_above_slow_sma: false
      vol_above_threshold: true
    bear_calm:
      spy_above_slow_sma: false
      vol_above_threshold: false
regime_weighting_enabled: false
static_factor_weights:
  momentum: 0.36
  earnings_surprise: 0.12
  quality: 0.2
  low_volatility: 0.14
  value: 0.08
  near_high: 0.0
  liquidity: 0.06
  growth: 0.04
factor_weights:
  bull_calm:
    momentum: 0.3
    growth: 0.2
    quality: 0.17
    value: 0.12
    liquidity: 0.11
    low_volatility: 0.1
  bull_stress:
    low_volatility: 0.24
    quality: 0.23
    value: 0.17
    momentum: 0.16
    liquidity: 0.1
    growth: 0.1
  bear_stress:
    low_volatility: 0.35
    quality: 0.27
    liquidity: 0.14
    value: 0.1
    growth: 0.07
    momentum: 0.07
  bear_calm:
    value: 0.3
    quality: 0.26
    low_volatility: 0.18
    momentum: 0.12
    growth: 0.07
    liquidity: 0.07
portfolio_builder:
  method: greedy_score_per_port_vol
  selection_vol_aversion: 0.2
  candidate_count: 120
  max_positions: 35
  min_selected: 17
  covariance_window_days: 252
  min_covariance_observations: 126
  covariance_shrinkage: 0.2
  require_positive_composite_score: false
  weighting: score_proportional
  max_position_weight: 0.08
  max_sector_weight: 0.3
  cluster_correlation_threshold: 0.7
  max_cluster_weight: 0.15
  max_tickers_per_cluster: 3
  do_not_buy: []
  cash_reserve: 0.025
  vol_target_enabled: true
  vol_target: 0.18
  vol_target_min_exposure: 0.3
  beta_target_enabled: false
  beta_target: 1.3
  beta_tolerance: 0.1
vetter:
  enabled: true
  mode: drawdown_only
  candidate_count: 200
  risk_horizon_days: 90
  system_prompt_file: /strategies/quality_core_v1.vetter_prompt.txt
  max_searches_per_ticker: 3
  news_lookback_days: 7
  max_articles_per_ticker: 4
  earnings_horizon_days: 90
  strictness: moderate
intraday:
  enabled: false
  benchmark_ticker: SPY
  trim_winners_enabled: false
  trim_winner_threshold_pct: 10.0
  trim_winner_partial_pct: 25.0
  trim_time_window_minutes_before_close: 60
  delay_buys_after_spike_enabled: false
  delay_buy_spike_threshold_pct: 15.0
  risk_event_action: reduce
delta_engine:
  entry_rank: 25
  exit_rank: 40
  confirmation_days: 3
  orphan_confirmation_days: 2
  max_positions: 35
max_positions: 35
min_score_percentile: 0.0
min_non_null_factors: 6
