# quality_core_v1 — Russell 3000 quality-tilted strategy with 4-bucket regime detection
#
# Regime is determined by two independent dimensions:
#   Trend:      SPY price vs its 200-day SMA (slow_sma)
#   Volatility: SPY 20-day annualized realized vol vs vol_threshold
#
# This produces four buckets, each with distinct optimal factor weights.
# In a future phase this config will be generated by the LLM strategy-config-service.

strategy_id: quality_core_v1
description: >
  Quality-tilted monthly ranking across the Russell 3000 universe.
  Regime is detected from SPY trend and realized volatility.
  Factor weights shift across four regimes: bull_calm leans heavily
  on momentum; bear_stress shifts to quality and low volatility.

universe:
  source: etf_holdings
  etf_ticker: IWV
  min_price: 5.0
  min_avg_dollar_volume_20d: 20000000

regime_detection:
  slow_sma: 200          # SPY must be above this SMA to be considered a bull trend
  vol_window: 20         # days used to calculate realized volatility
  vol_threshold: 0.20    # annualized vol above this = "stress" regime
  regimes:
    bull_calm:           # trending up, volatility contained — ride winners
      spy_above_slow_sma: true
      vol_above_threshold: false
    bull_stress:         # trending up but choppy — reduce momentum, add defense
      spy_above_slow_sma: true
      vol_above_threshold: true
    bear_stress:         # downtrend + high vol — maximum defense
      spy_above_slow_sma: false
      vol_above_threshold: true
    bear_calm:           # downtrend but orderly — value starts working
      spy_above_slow_sma: false
      vol_above_threshold: false

factor_weights:
  bull_calm:
    momentum:       0.40
    quality:        0.20
    growth:         0.20
    value:          0.10
    low_volatility: 0.05
    liquidity:      0.05

  bull_stress:
    momentum:       0.20
    quality:        0.30
    growth:         0.15
    value:          0.15
    low_volatility: 0.15
    liquidity:      0.05

  bear_stress:
    quality:        0.35
    low_volatility: 0.30
    value:          0.20
    momentum:       0.05
    growth:         0.05
    liquidity:      0.05

  bear_calm:
    value:          0.30
    quality:        0.25
    low_volatility: 0.20
    momentum:       0.10
    growth:         0.10
    liquidity:      0.05

max_positions: 30
min_score_percentile: 0.0
