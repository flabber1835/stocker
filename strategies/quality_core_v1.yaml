# quality_core_v1 — Russell 3000 quality-tilted strategy with regime-aware factor weights
#
# This config is the source of truth for the ranking engine.
# In a future phase this will be generated by the LLM strategy-config-service.
# For now it is maintained by hand and version-controlled here.
#
# Factor weights must sum to 1.0 within each regime.
# Regime is determined by factor-engine based on SPY vs its 50/200-day SMAs.

strategy_id: quality_core_v1
description: >
  Quality-tilted monthly ranking across the Russell 3000 universe.
  Factor weights shift with market regime: momentum leads in bull markets,
  quality and low volatility dominate in bear markets.

universe:
  source: etf_holdings
  etf_ticker: IWV           # iShares Russell 3000 ETF
  min_price: 5.0            # exclude penny stocks
  min_avg_dollar_volume_20d: 20000000  # $20M minimum liquidity

factor_weights:
  bull:
    # Trend is your friend. Lean into what's working.
    momentum:       0.35
    quality:        0.25
    growth:         0.20
    value:          0.10
    low_volatility: 0.05
    liquidity:      0.05

  bear:
    # Capital preservation. Favour sturdy, cheap, low-vol names.
    quality:        0.35
    low_volatility: 0.25
    value:          0.20
    momentum:       0.10
    growth:         0.05
    liquidity:      0.05

  neutral:
    # Balanced. Quality and momentum share top billing.
    quality:        0.30
    momentum:       0.25
    value:          0.20
    growth:         0.15
    low_volatility: 0.05
    liquidity:      0.05

max_positions: 30
min_score_percentile: 0.0
