# quality_core_v1 — broad US equity quality-tilted strategy with 4-bucket regime detection
#
# Regime separates two market questions:
#   Trend:      should I be aggressive or defensive?     (SPY vs 200-day SMA)
#   Volatility: should I trust momentum or demand stability?  (20-day realized vol)
#
# confirmation_days prevents twitchy regime switches — both signals must be
# consistent for 5 consecutive days before a regime change is accepted.
#
# In a future phase this config will be generated by the LLM strategy-config-service.

strategy_id: quality_core_v1
description: >
  Quality-tilted monthly ranking across the broad US equity universe (AV LISTING_STATUS).
  4-bucket regime (trend × volatility) with 5-day confirmation smoothing.
  Factor weights shift materially across regimes.

universe:
  source: av_listing
  min_price: 5.0
  min_avg_dollar_volume_20d: 20000000

factor_engine:
  momentum_short_window: 21  # recent-price reference: skip last ~1 month
  momentum_long_window: 252  # base-price reference: ~12-month lookback
  volatility_window: 252     # trading days for realized-vol (low_volatility factor)
  liquidity_window: 20       # trading days for avg dollar volume (liquidity factor)
  pe_pb_cap: 50.0            # cap PE and PB before computing yields; beyond this the signal is flat
  spy_price_lookback_days: 600  # calendar days of SPY history loaded for regime detection
  quality_use_gross_profitability: true  # quality profitability leg = gross-profits/assets (Novy-Marx), not ROE; falls back to ROE where total_assets is missing
  momentum_method: residual_riskadj  # 12-1 momentum stripped of the market (idiosyncratic, Blitz-Huij-Martens) AND divided by formation vol (Sharpe-like) — the cross-sectional analogue of vol-scaled/residual momentum; ~2x Sharpe + far smaller crash tails vs raw. Set 'raw' to revert.
  momentum_blend_windows: [252, 126]  # blend 12-1 and 6-1 momentum (rank-average); both skip the last month, so the factor reacts sooner to emerging trends without chasing short-term spikes/reversals. Set null for single-horizon (momentum_long_window).
  # industry_neutral_factors defaults to [value, quality] (sector-neutral ranking); see schema

regime_detection:
  slow_sma: 200            # SPY trend anchor — 200-day SMA
  vol_window: 20           # days used to calculate realized volatility
  vol_threshold: 0.20      # annualized vol above this = "stress" (≈ VIX 20)
  confirmation_days: 5     # both signals must hold for 5 consecutive days
  regimes:
    bull_calm:             # trending up, volatility contained — ride winners
      spy_above_slow_sma: true
      vol_above_threshold: false
    bull_stress:           # trending up but choppy — selective momentum, more quality
      spy_above_slow_sma: true
      vol_above_threshold: true
    bear_stress:           # downtrend + high vol — maximum defense
      spy_above_slow_sma: false
      vol_above_threshold: true
    bear_calm:             # downtrend but orderly — value works, lower momentum
      spy_above_slow_sma: false
      vol_above_threshold: false

# Regime ROTATION is OFF (regime_weighting_enabled: false). The regime is still
# DETECTED below (and written to regime_snapshots / shown on the dashboard) but it
# no longer changes the factor weights — static_factor_weights is used in every
# regime. Rationale: broad regime/value-growth-quality factor rotation is weakly
# supported out-of-sample and overfits on the handful of historical regime episodes
# (Asness "factor timing is deceptively difficult"; Cederburg et al. 2020 on
# volatility-managed portfolios). A single static multi-factor vector is hard to
# beat OOS, and crash protection is provided independently by the vetter's
# beta-adjusted, vol-scaled falling-knife drawdown veto. Set
# regime_weighting_enabled: true to restore the per-regime factor_weights table.
regime_weighting_enabled: false

# Static multi-factor weights — RESEARCH-BACKED BALANCED CENTROID (reverted from the
# momentum-forward tilt). The strongest result in the factor literature is not
# momentum alone but MOMENTUM + VALUE TOGETHER: they are negatively correlated, so
# the combination's Sharpe far exceeds either alone (Asness-Moskowitz-Pedersen,
# "Value and Momentum Everywhere", 2013). A momentum-dominant tilt that starves
# value gives up that diversification and adds momentum crash risk (Daniel-Moskowitz
# 2016). So momentum and value are held CO-EQUAL (0.19 each), with quality as the
# anchor (best-evidenced factor, QMJ — Asness-Frazzini-Pedersen), low_volatility
# meaningful (BAB / low-vol anomaly — Frazzini-Pedersen, Baker-Bradley-Wurgler),
# growth modest (weak standalone premium), and net-issuance a small robust overlay.
# Momentum is still measured the research-backed way (residual + vol-scaled, see
# momentum_method) — only the WEIGHTING was rebalanced away from momentum-dominance.
# Crash protection also comes independently from the vetter's beta-adjusted,
# vol-scaled falling-knife veto. Sums to 1.0.
# (The momentum-forward tilt this replaced was momentum .28 / quality .22 /
#  growth .16 / liq .11 / value .09 / low_vol .08 / issuance .06 — see git history.)
static_factor_weights:
  momentum:       0.19   # co-equal with value (mom+value combo is the strongest evidence)
  value:          0.19   # co-equal with momentum — NOT starved
  quality:        0.22   # anchor: best-evidenced factor (QMJ)
  low_volatility: 0.13   # low-vol / BAB anomaly — meaningful, not demoted
  liquidity:      0.11
  growth:         0.10   # modest — weak standalone premium
  issuance:       0.06   # net-share-issuance (buybacks rank high); robust + low-turnover

factor_weights:
  # RETAINED for reference / easy re-enable (unused while regime_weighting_enabled
  # is false). Weights calibrated to academic literature on regime-conditional factor premiums.
  # Primary sources: Cooper, Gutierrez & Hameed (JF 2004) for momentum market-state
  # dependency; Daniel & Moskowitz (JFE 2016) for momentum crash risk; Frazzini &
  # Pedersen (JFE 2014) for BAB / low-vol premium scaling; Ang, Hodrick, Xing & Zhang
  # (JF 2006 / JFE 2009) for low-vol anomaly; Asness, Frazzini & Pedersen (RoF 2019)
  # for QMJ quality premium; Fama & French (JF 1996) and LSV (JF 1994) for value timing.

  bull_calm:               # Bull / Low-Volatility — momentum dominates (Cooper et al. JF 2004)
    momentum:       0.30   # only factor with statistically significant premium in UP market states
    growth:         0.20   # risk-on environment rewards earnings momentum; short-term persistence valid
    quality:        0.17   # stable anchor; always earns premium but less incremental in calm bull
    value:          0.12   # underperforms in growth-led expansions (Fama-French 1996; LSV 1994)
    liquidity:      0.11   # execution floor + institutional quality filter
    low_volatility: 0.10   # smallest premium in calm bull (Blitz & van Vliet JPM 2007)

  bull_stress:             # Bull / High-Volatility — quality and low-vol absorb momentum crash risk
    low_volatility: 0.24   # BAB premium approximately doubles above vol=20% (Frazzini & Pedersen 2014)
    quality:        0.23   # premium scales with VIX (Ang et al. 2009; Asness et al. RoF 2019)
    value:          0.17   # selective market rewards value; moderate support
    momentum:       0.16   # Sharpe drops ~40% when vol rises even in uptrend (Daniel & Moskowitz 2016)
    liquidity:      0.10   # execution quality maintained
    growth:         0.10   # high-multiple growth penalized by volatility; long-duration effect

  bear_stress:             # Bear / High-Volatility — maximum defense
    low_volatility: 0.35   # BAB at maximum premium; anomaly largest in bad states (Ang et al. JF 2006)
    quality:        0.27   # QMJ earns ~8% in credit crises (Asness, Frazzini & Pedersen RoF 2019)
    liquidity:      0.14   # flight-to-liquidity premium (Amihud JFM 2002; Pastor & Stambaugh JPE 2003)
    value:          0.10   # quality filter limits value traps (Piotroski JAR 2000)
    growth:         0.07   # earnings growth as quality signal; minimum contribution
    momentum:       0.07   # highest crash risk state (Daniel & Moskowitz JFE 2016)

  bear_calm:               # Bear / Low-Volatility — value+quality; momentum cut (Cooper et al. 2004)
    value:          0.30   # premium peaks post-distress; contrarian payoff window (Fama-French 1996)
    quality:        0.26   # Graham-Dodd combination: value WITH quality prevents value traps
    low_volatility: 0.18   # market still declining; downside protection still warranted
    momentum:       0.12   # Cooper et al. JF 2004: momentum −0.37%/month in DOWN market states
    growth:         0.07   # growth still compressed in orderly bear
    liquidity:      0.07   # reduced vs bear_stress; less acute flight-to-liquidity effect

portfolio_builder:
  method: greedy_score_per_port_vol  # score / hypothetical equal-weight portfolio vol (total, not marginal delta)
  candidate_count: 100               # top N from ranker fed into greedy selection
  max_positions: 30                  # final portfolio size
  min_selected: 15                   # ~half max_positions. A build selecting fewer is flagged degraded so the delta engine HOLDS the book rather than orphan-exiting the rest over a thin target. Also keeps n above 1/max_position_weight (10) so the position cap stays feasible (PB-1/PB-3).
  covariance_window_days: 252        # trading days used to build covariance matrix
  min_covariance_observations: 126   # drop tickers with fewer non-NaN return observations (~6 months)
  covariance_shrinkage: 0.20         # Ledoit-Wolf-style: 80% sample + 20% diagonal
  require_positive_composite_score: false  # set true to exclude negative-score names pre-selection
  weighting: adj_score_proportional  # equal_weight | adj_score_proportional | score_proportional | inverse_vol
  max_position_weight: 0.10          # hard cap per position; excess redistributed to others
  max_sector_weight: 0.25            # core sector cap (theme sleeve retired)
  cluster_correlation_threshold: 0.70  # |corr| >= this groups two names into one correlation cluster
  max_cluster_weight: 0.15           # core correlation-cluster weight cap (theme sleeve retired)
  max_tickers_per_cluster: 3         # core name-concentration cap (theme sleeve retired)
  do_not_buy: []                     # hard-exclude list: ESG screens, legal holds, insider restrictions
  cash_reserve: 0.025                # keep 2.5% uninvested (day orders don't batch-reserve buying power, so OPG buffer no longer needed)
  # (Thematic overlay RETIRED — the engine is theme-agnostic; sector concentration is
  # bounded by max_sector_weight + the correlation-cluster caps above.)
vetter:
  enabled: true
  candidate_count: 200         # vets top-200 by rank + all held (200 >> the builder's 100 horizon)
  risk_horizon_days: 90        # risk assessment window — holding is variable (weeks to months)
  system_prompt_file: /strategies/quality_core_v1.vetter_prompt.txt
  max_searches_per_ticker: 3   # agentic web searches allowed per ticker
  news_lookback_days: 7        # how far back to pull AV news sentiment
  max_articles_per_ticker: 4   # max AV news articles loaded per ticker
  earnings_horizon_days: 90    # flag upcoming earnings within this many days
  strictness: moderate         # strict | moderate | permissive

intraday:
  enabled: false               # intraday-monitor service not yet built
  benchmark_ticker: SPY
  trim_winners_enabled: false
  trim_winner_threshold_pct: 10.0         # trim if stock up this % intraday
  trim_winner_partial_pct: 25.0           # sell this fraction of position
  trim_time_window_minutes_before_close: 60
  delay_buys_after_spike_enabled: false
  delay_buy_spike_threshold_pct: 15.0
  risk_event_action: reduce              # cut | reduce | hold

delta_engine:
  entry_rank: 25        # rank ≤ this for confirmation_days → enter portfolio
  exit_rank: 40         # rank > this for confirmation_days → exit portfolio
  confirmation_days: 3  # consecutive daily runs required to confirm rank-based entry/exit
  orphan_confirmation_days: 3  # builds a held name must be absent from target before sold (flag builds 1-2, sell build 3) — one day more hysteresis than the default 2
  max_positions: 30     # maximum portfolio size

max_positions: 30
min_score_percentile: 0.0
min_non_null_factors: 6   # all 6 factors required — any ticker with a null factor is dropped to prevent weight drift
required_factors:         # belt-and-suspenders: explicitly name each factor with non-zero weight
  - quality               # 0.15–0.25 weight; no fundamental data = no ranking
  - growth                # 0.05–0.21 weight; right-skewed; winsorized at 1%/99%
  - value                 # 0.08–0.28 weight; was the primary driver of remaining weight drift
  - momentum              # 0.10–0.27 weight; requires 252 days of price history
  - low_volatility        # 0.14–0.34 weight; requires price history
  - liquidity             # 0.08–0.18 weight; requires price + volume history
