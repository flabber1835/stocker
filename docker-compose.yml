services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=128MB
    environment:
      POSTGRES_USER: stocker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stocker}
      POSTGRES_DB: stocker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      # -h 127.0.0.1 tests localhost inside the container; bridge-IP reachability
      # is not guaranteed when this passes.  See migrate.sh for the retry pattern.
      test: ["CMD-SHELL", "pg_isready -U stocker -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s   # cold NAS spinning-disk init can take 30-60s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  db-migrator:
    build:
      context: .
      dockerfile: services/db-migrator/Dockerfile
      network: host
    restart: "no"
    environment:
      DATABASE_URL: postgresql://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker?connect_timeout=30
    depends_on:
      postgres:
        condition: service_healthy

  # ── App services ─────────────────────────────────────────────────────────────
  # depends_on rules are enforced by tests/test_compose.py:
  #   - service_healthy only for load-bearing prerequisites (postgres, redis,
  #     risk-service for trade-executor)
  #   - service_completed_successfully only for db-migrator (api, scheduler)
  #   - peer services use built-in retry, not Docker deps
  # ─────────────────────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRADE_EXECUTOR_URL:    http://trade-executor:8000
      ALPACA_SYNC_URL:       http://alpaca-sync:8000
      PIPELINE_URL:          http://pipeline:8000
      VETTER_URL:            http://llm-vetter:8000
      AV_INGESTOR_URL:       http://av-ingestor:8000
      PORTFOLIO_BUILDER_URL: http://portfolio-builder:8000
      SCHEDULER_URL:         http://scheduler:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  av-ingestor:
    build:
      context: .
      dockerfile: services/av-ingestor/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      AV_API_KEY: ${AV_API_KEY:-demo}
      AV_RATE_LIMIT_RPM: ${AV_RATE_LIMIT_RPM:-75}
      MOCK_DATA: ${MOCK_DATA:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONUNBUFFERED: "1"
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  pipeline:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
      network: host
    restart: unless-stopped
    # Cap the pipeline's memory so the factor step can't trigger a HOST-WIDE OOM
    # that takes out postgres/redis too. With a cgroup limit the pipeline is the
    # predictable victim, and the scheduler's MAX_RESTART_ABORT_RETRIES breaker
    # turns the resulting restart into a clean suspend instead of an infinite loop.
    # TUNE PIPELINE_MEM_LIMIT to your host: must exceed the factor-step peak
    # (~0.3-0.5 GB for a few-thousand-ticker universe) with headroom. Too low and
    # the step will OOM every run and the chain will suspend after 3 cycles.
    mem_limit: ${PIPELINE_MEM_LIMIT:-2g}
    ports:
      - "8018:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      STRATEGY_CONFIG_PATH: ${STRATEGY_CONFIG_PATH:-/strategies/quality_core_v1.yaml}
      ARTIFACTS_PATH: /artifacts
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./strategies:/strategies:ro
      - ./artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  strategy-validator:
    build:
      context: .
      dockerfile: services/strategy-validator/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  strategy-config-service:
    profiles: [optional]
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8006:8000"
    environment:
      SERVICE_NAME: strategy-config-service

  llm-gateway:
    build:
      context: .
      dockerfile: services/llm-gateway/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8007:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_TIMEOUT_SECS: ${OLLAMA_TIMEOUT_SECS:-600}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  portfolio-builder:
    build:
      context: .
      dockerfile: services/portfolio-builder/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8008:8000"
    environment:
      SERVICE_NAME: portfolio-builder
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      STRATEGY_CONFIG_PATH: ${STRATEGY_CONFIG_PATH:-/strategies/quality_core_v1.yaml}
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    profiles: [ollama]
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "until ollama list > /dev/null 2>&1; do echo 'waiting for ollama...'; sleep 5; done && ollama pull ${OLLAMA_MODEL:-qwen2.5:7b}"]
    depends_on:
      - ollama

  llm-vetter:
    build:
      context: .
      dockerfile: services/llm-vetter/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8016:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      LLM_GATEWAY_URL: http://llm-gateway:8000
      AV_API_KEY: ${AV_API_KEY:-demo}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      # Drawdown-only mode (DEFAULT). The LLM vetter is OFF by default so a deploy
      # never silently burns API credits — the falling-knife drawdown backstop is
      # the only entry block. Set VETTER_LLM_ENABLED=true in .env to re-enable the LLM.
      VETTER_LLM_ENABLED: ${VETTER_LLM_ENABLED:-false}
      # Falling-knife backstop. EXCESS (beta-adjusted, market-relative) is the primary
      # trigger; BACKSTOP is the absolute floor, set ABOVE the excess so the market-
      # relative drop governs moderate cases and the floor only catches extreme routs.
      DRAWDOWN_BACKSTOP_PCT: ${DRAWDOWN_BACKSTOP_PCT:-0.25}
      DRAWDOWN_EXCESS_PCT: ${DRAWDOWN_EXCESS_PCT:-0.15}
      DRAWDOWN_BETA_LOOKBACK: ${DRAWDOWN_BETA_LOOKBACK:-120}
      DRAWDOWN_VOL_SCALING: ${DRAWDOWN_VOL_SCALING:-true}
      DRAWDOWN_VOL_ANCHOR: ${DRAWDOWN_VOL_ANCHOR:-0.35}
      DRAWDOWN_EXCESS_MIN: ${DRAWDOWN_EXCESS_MIN:-0.10}
      DRAWDOWN_EXCESS_MAX: ${DRAWDOWN_EXCESS_MAX:-0.30}
      STRATEGY_CONFIG_PATH: ${STRATEGY_CONFIG_PATH:-/strategies/quality_core_v1.yaml}
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  alpaca-sim:
    profiles: [test]
    build:
      context: .
      dockerfile: services/alpaca-sim/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8020:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  alpaca-sync:
    build:
      context: .
      dockerfile: services/alpaca-sync/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8009:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  intraday-monitor:
    profiles: [optional]
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      SERVICE_NAME: intraday-monitor

  risk-service:
    build:
      context: .
      dockerfile: services/risk-service/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8011:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      KILL_SWITCH: ${KILL_SWITCH:-false}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
      MAX_ORDER_NOTIONAL: ${MAX_ORDER_NOTIONAL:-50000.0}
      PAPER_ONLY: ${PAPER_ONLY:-true}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  trade-executor:
    build:
      context: .
      dockerfile: services/trade-executor/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8012:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      RISK_SERVICE_URL: http://risk-service:8000
      EXIT_SYNC_MAX_AGE_HOURS: ${EXIT_SYNC_MAX_AGE_HOURS:-24}
      DEFAULT_MAX_POSITIONS: ${DEFAULT_MAX_POSITIONS:-30}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      risk-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  backtester:
    build:
      context: .
      dockerfile: services/backtester/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8013:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      STRATEGY_CONFIG_PATH: ${STRATEGY_CONFIG_PATH:-/strategies/quality_core_v1.yaml}
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── theme-classifier: standalone thematic universe (AI-infra). Fully decoupled
  # from the trading pipeline — reads daily_prices/fundamentals read-only, writes
  # ONLY theme_exposures, consumed by the dashboard's read-only Theme tab. Nothing
  # in ranking/portfolio-builder/delta/risk/trade-executor references it.
  theme-classifier:
    build:
      context: .
      dockerfile: services/theme-classifier/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8025:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      THEME_REFRESH_DAYS: ${THEME_REFRESH_DAYS:-30}
      THEME_MIN_EXPOSURE: ${THEME_MIN_EXPOSURE:-0.35}
    depends_on:
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  evaluator:
    profiles: [optional]
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8014:8000"
    environment:
      SERVICE_NAME: evaluator

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8015:8000"
    environment:
      AV_INGESTOR_URL:          http://av-ingestor:8000
      PIPELINE_URL:             http://pipeline:8000
      VETTER_URL:               http://llm-vetter:8000
      PORTFOLIO_BUILDER_URL:    http://portfolio-builder:8000
      ALPACA_SYNC_URL:          http://alpaca-sync:8000
      TRADE_EXECUTOR_URL:       http://trade-executor:8000
      # 17:30 ET: ~1.5h after the 4pm close. Session-keying means fetch-data is
      # "done" only once AV has actually published the close bar (session_date
      # advances to the target session); if AV is not ready yet at 17:30 the chain
      # waits and retries, so an early start is safe and gives the long fetch
      # plenty of time to finish well before midnight (no cross-midnight rollover).
      RANK_SCHEDULE_CRON:       ${RANK_SCHEDULE_CRON:-30 17 * * 1-5}
      TZ:                       America/New_York
      DATABASE_URL:             postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      SUPERVISOR_INTERVAL_SECS: ${SUPERVISOR_INTERVAL_SECS:-300}
    depends_on:
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8004:8000"
    environment:
      API_URL: http://api:8000
      AV_INGESTOR_URL: http://av-ingestor:8000
      PIPELINE_URL: http://pipeline:8000
      VETTER_URL: http://llm-vetter:8000
      PORTFOLIO_URL: http://portfolio-builder:8000
      SCHEDULER_URL: http://scheduler:8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Test-harness simulators ───────────────────────────────────────────────────
  # Behind the [test] profile so plain `docker compose up` does NOT start them.
  # Activate together with the harness overlay (see tests/harness/docker-compose.yml).

  av-sim:
    profiles: [test]
    build:
      context: .
      dockerfile: services/av-sim/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8021:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  anthropic-sim:
    profiles: [test]
    build:
      context: .
      dockerfile: services/anthropic-sim/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8022:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  tavily-sim:
    profiles: [test]
    build:
      context: .
      dockerfile: services/tavily-sim/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8023:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Playwright status monitor ─────────────────────────────────────────────────
  # Optional service: monitors the dashboard status bar after triggering a manual
  # run. Screenshots and a JSON event log are written to ./artifacts/monitor/.
  # Start with: docker compose run --rm playwright-monitor
  # Or keep running: set PLAYWRIGHT_MONITOR=true in .env before `docker compose up`
  playwright-monitor:
    profiles:
      - monitor
    build:
      context: .
      dockerfile: services/playwright-monitor/Dockerfile
      network: host
    environment:
      DASHBOARD_URL:          http://dashboard:8000
      MONITOR_TIMEOUT_MINS:   ${MONITOR_TIMEOUT_MINS:-90}
      POLL_SECS:              ${MONITOR_POLL_SECS:-2.0}
      ARTIFACTS_DIR:          /artifacts/monitor
    volumes:
      - ./artifacts:/artifacts
    depends_on:
      dashboard:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
  redis_data:
  ollama_models:

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1450"
