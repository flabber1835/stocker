services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=128MB
    environment:
      POSTGRES_USER: stocker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stocker}
      POSTGRES_DB: stocker
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      # IMPORTANT: -h 127.0.0.1 tests localhost INSIDE the postgres container.
      # This passes before the docker bridge network IP is routable by other
      # containers.  Any service that connects via the bridge (all app services)
      # must use its own retry logic — never assume bridge reachability from
      # this healthcheck alone.  See services/db-migrator/migrate.sh for the
      # canonical retry pattern.
      test: ["CMD-SHELL", "pg_isready -U stocker -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s   # cold NAS spinning-disk init can take 30-60s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  db-migrator:
    build:
      context: .
      dockerfile: services/db-migrator/Dockerfile
      network: host
    restart: "no"
    environment:
      DATABASE_URL: postgresql://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker?connect_timeout=30
    depends_on:
      postgres:
        condition: service_healthy

  # ── App services ─────────────────────────────────────────────────────────────
  #
  # Dependency philosophy:
  #   • depends_on is used ONLY for hard structural prerequisites:
  #       - postgres/redis: service must exist before the app can start at all
  #       - db-migrator:service_completed_successfully: schema must be current
  #         before API / scheduler touch the DB (api, scheduler only)
  #       - risk-service:service_healthy: trade-executor must never run without
  #         its safety gate available
  #   • Services do NOT depend on each other's service_healthy unless the
  #     dependency is load-bearing at process start time.
  #   • Inter-service HTTP calls happen at request time; every service handles
  #     peer unavailability gracefully (warm_up_db_in_background pattern for DB;
  #     built-in retry/supervisor ticks for the scheduler).
  #   • Adding service_healthy deps to the scheduler creates a long mandatory
  #     serial chain that blocks startup for 5-7 minutes on a cold NAS and makes
  #     the scheduler hostage to optional services (llm-gateway, llm-vetter).
  #     The scheduler's _trigger_step already catches all HTTP errors and retries
  #     on the next supervisor tick — Docker deps must not duplicate that logic.
  # ─────────────────────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRADE_EXECUTOR_URL:    http://trade-executor:8000
      ALPACA_SYNC_URL:       http://alpaca-sync:8000
      PIPELINE_URL:          http://pipeline:8000
      VETTER_URL:            http://llm-vetter:8000
      AV_INGESTOR_URL:       http://av-ingestor:8000
      PORTFOLIO_BUILDER_URL: http://portfolio-builder:8000
      SCHEDULER_URL:         http://scheduler:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  av-ingestor:
    build:
      context: .
      dockerfile: services/av-ingestor/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      AV_API_KEY: ${AV_API_KEY:-demo}
      AV_RATE_LIMIT_RPM: ${AV_RATE_LIMIT_RPM:-75}
      MOCK_DATA: ${MOCK_DATA:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONUNBUFFERED: "1"
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  pipeline:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8018:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./strategies:/strategies:ro
      - ./artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  strategy-validator:
    build:
      context: .
      dockerfile: services/strategy-validator/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  strategy-config-service:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8006:8000"
    environment:
      SERVICE_NAME: strategy-config-service

  llm-gateway:
    build:
      context: .
      dockerfile: services/llm-gateway/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8007:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_TIMEOUT_SECS: ${OLLAMA_TIMEOUT_SECS:-600}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  portfolio-builder:
    build:
      context: .
      dockerfile: services/portfolio-builder/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8008:8000"
    environment:
      SERVICE_NAME: portfolio-builder
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    profiles: [ollama]
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "until ollama list > /dev/null 2>&1; do echo 'waiting for ollama...'; sleep 5; done && ollama pull ${OLLAMA_MODEL:-qwen2.5:7b}"]
    depends_on:
      - ollama

  llm-vetter:
    build:
      context: .
      dockerfile: services/llm-vetter/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8016:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      LLM_GATEWAY_URL: http://llm-gateway:8000
      AV_API_KEY: ${AV_API_KEY:-demo}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  alpaca-sync:
    build:
      context: .
      dockerfile: services/alpaca-sync/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8009:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  intraday-monitor:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      SERVICE_NAME: intraday-monitor

  risk-service:
    build:
      context: .
      dockerfile: services/risk-service/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8011:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      KILL_SWITCH: ${KILL_SWITCH:-false}
      LIVE_TRADING_ENABLED: ${LIVE_TRADING_ENABLED:-false}
      MAX_ORDER_NOTIONAL: ${MAX_ORDER_NOTIONAL:-50000.0}
      PAPER_ONLY: ${PAPER_ONLY:-true}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  trade-executor:
    build:
      context: .
      dockerfile: services/trade-executor/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8012:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      RISK_SERVICE_URL: http://risk-service:8000
      EXIT_SYNC_MAX_AGE_HOURS: ${EXIT_SYNC_MAX_AGE_HOURS:-24}
      DEFAULT_MAX_POSITIONS: ${DEFAULT_MAX_POSITIONS:-30}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      risk-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  backtester:
    build:
      context: .
      dockerfile: services/backtester/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8013:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  evaluator:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8014:8000"
    environment:
      SERVICE_NAME: evaluator

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8015:8000"
    environment:
      AV_INGESTOR_URL:          http://av-ingestor:8000
      PIPELINE_URL:             http://pipeline:8000
      VETTER_URL:               http://llm-vetter:8000
      PORTFOLIO_BUILDER_URL:    http://portfolio-builder:8000
      ALPACA_SYNC_URL:          http://alpaca-sync:8000
      RANK_SCHEDULE_CRON:       ${RANK_SCHEDULE_CRON:-15 21 * * 1-5}
      DATABASE_URL:             postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      SUPERVISOR_INTERVAL_SECS: ${SUPERVISOR_INTERVAL_SECS:-300}
    depends_on:
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      # av-ingestor, pipeline, portfolio-builder, llm-vetter intentionally NOT
      # listed here.  The scheduler's _trigger_step catches all HTTP errors and
      # retries every SUPERVISOR_INTERVAL_SECS tick; requiring those services to
      # be healthy first creates a ~5-7 min mandatory chain on a cold NAS start
      # and makes the scheduler hostage to optional services like llm-vetter.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8004:8000"
    environment:
      API_URL: http://api:8000
      AV_INGESTOR_URL: http://av-ingestor:8000
      PIPELINE_URL: http://pipeline:8000
      VETTER_URL: http://llm-vetter:8000
      PORTFOLIO_URL: http://portfolio-builder:8000
      SCHEDULER_URL: http://scheduler:8000
    # No depends_on: dashboard is a static-file server; the JS calls the API
    # from the browser.  Blocking dashboard startup on api:service_healthy adds
    # a full extra chain (postgres→db-migrator→api→dashboard) with no benefit —
    # the browser shows errors when API calls fail, which is the right UX.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
  redis_data:
  ollama_models:
