services:

  # ── Infrastructure ──────────────────────────────────────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: stocker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stocker}
      POSTGRES_DB: stocker
    volumes:
      - ./database:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocker"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Working services ──────────────────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  av-ingestor:
    build:
      context: .
      dockerfile: services/av-ingestor/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      AV_API_KEY: ${AV_API_KEY:-demo}
      AV_RATE_LIMIT_RPM: ${AV_RATE_LIMIT_RPM:-75}
      MOCK_DATA: ${MOCK_DATA:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONUNBUFFERED: "1"
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  factor-engine:
    build:
      context: .
      dockerfile: services/factor-engine/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./strategies:/strategies:ro
      - ./artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  ranker:
    build:
      context: .
      dockerfile: services/ranker/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./strategies:/strategies:ro
      - ./artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8004:8000"
    environment:
      API_URL: http://api:8000
      AV_INGESTOR_URL: http://av-ingestor:8000
      FACTOR_ENGINE_URL: http://factor-engine:8000
      RANKER_URL: http://ranker:8000
      VETTER_URL: http://llm-vetter:8000
      PORTFOLIO_URL: http://portfolio-builder:8000
      SCHEDULER_URL: http://scheduler:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Stubbed services (filled in later) ────────────────────────────────────────────────────────────────────────────
  # Each stub serves GET /health → {"status":"ok","service":"<name>"}

  strategy-validator:
    build:
      context: .
      dockerfile: services/strategy-validator/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8005:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  strategy-config-service:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8006:8000"
    environment:
      SERVICE_NAME: strategy-config-service

  llm-gateway:
    build:
      context: .
      dockerfile: services/llm-gateway/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8007:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_TIMEOUT_SECS: ${OLLAMA_TIMEOUT_SECS:-600}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  portfolio-builder:
    build:
      context: .
      dockerfile: services/portfolio-builder/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8008:8000"
    environment:
      SERVICE_NAME: portfolio-builder
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      REDIS_URL: redis://redis:6379/0
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    profiles: [ollama]
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "until ollama list > /dev/null 2>&1; do echo 'waiting for ollama...'; sleep 5; done && ollama pull ${OLLAMA_MODEL:-qwen2.5:7b}"]
    depends_on:
      - ollama

  llm-vetter:
    build:
      context: .
      dockerfile: services/llm-vetter/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8016:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      LLM_GATEWAY_URL: http://llm-gateway:8000
      AV_API_KEY: ${AV_API_KEY:-demo}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  alpaca-sync:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8009:8000"
    environment:
      SERVICE_NAME: alpaca-sync

  intraday-monitor:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      SERVICE_NAME: intraday-monitor

  risk-service:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8011:8000"
    environment:
      SERVICE_NAME: risk-service

  trade-executor:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8012:8000"
    environment:
      SERVICE_NAME: trade-executor

  backtester:
    build:
      context: .
      dockerfile: services/backtester/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8013:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  evaluator:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8014:8000"
    environment:
      SERVICE_NAME: evaluator

  delta-engine:
    build:
      context: .
      dockerfile: services/delta-engine/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8017:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:${POSTGRES_PASSWORD:-stocker}@postgres:5432/stocker
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
      network: host
    restart: unless-stopped
    ports:
      - "8015:8000"
    environment:
      AV_INGESTOR_URL:       http://av-ingestor:8000
      FACTOR_ENGINE_URL:     http://factor-engine:8000
      RANKER_URL:            http://ranker:8000
      VETTER_URL:            http://llm-vetter:8000
      PORTFOLIO_BUILDER_URL: http://portfolio-builder:8000
      DELTA_ENGINE_URL:      http://delta-engine:8000
      RANK_SCHEDULE_CRON:        ${RANK_SCHEDULE_CRON:-15 21 * * 1-5}
      VETTER_TIMEOUT_SECS:       ${VETTER_TIMEOUT_SECS:-600}
      VETTER_CANDIDATE_COUNT:    ${VETTER_CANDIDATE_COUNT:-50}
      VETTER_BUFFER_MINUTES:     ${VETTER_BUFFER_MINUTES:-30}
    depends_on:
      av-ingestor:
        condition: service_healthy
      factor-engine:
        condition: service_healthy
      ranker:
        condition: service_healthy
      llm-vetter:
        condition: service_healthy
      delta-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  ollama_models:
