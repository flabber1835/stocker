services:

  # ── Infrastructure ──────────────────────────────────────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: stocker
      POSTGRES_PASSWORD: stocker
      POSTGRES_DB: stocker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocker"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Working services ──────────────────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:stocker@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  av-ingestor:
    build:
      context: .
      dockerfile: services/av-ingestor/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:stocker@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      AV_API_KEY: ${AV_API_KEY:-demo}
      AV_RATE_LIMIT_RPM: ${AV_RATE_LIMIT_RPM:-75}
      MOCK_DATA: ${MOCK_DATA:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PYTHONUNBUFFERED: "1"
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  factor-engine:
    build:
      context: .
      dockerfile: services/factor-engine/Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:stocker@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./strategies:/strategies:ro
      - ./artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  ranker:
    build:
      context: .
      dockerfile: services/ranker/Dockerfile
    restart: unless-stopped
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:stocker@postgres:5432/stocker
      REDIS_URL: redis://redis:6379
      STRATEGY_CONFIG_PATH: /strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./strategies:/strategies:ro
      - ./artifacts:/artifacts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    restart: unless-stopped
    ports:
      - "8004:8000"
    environment:
      API_URL: http://api:8000
      AV_INGESTOR_URL: http://av-ingestor:8000
      FACTOR_ENGINE_URL: http://factor-engine:8000
      RANKER_URL: http://ranker:8000
      VETTER_URL: http://llm-vetter:8000
      PORTFOLIO_URL: http://portfolio-builder:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Stubbed services (filled in later) ────────────────────────────────────────────────────────────────────────────
  # Each stub serves GET /health → {"status":"ok","service":"<name>"}

  strategy-validator:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
    restart: unless-stopped
    ports:
      - "8005:8000"
    environment:
      SERVICE_NAME: strategy-validator

  strategy-config-service:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
    restart: unless-stopped
    ports:
      - "8006:8000"
    environment:
      SERVICE_NAME: strategy-config-service

  llm-gateway:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
    restart: unless-stopped
    ports:
      - "8007:8000"
    environment:
      SERVICE_NAME: llm-gateway

  portfolio-builder:
    build:
      context: .
      dockerfile: services/portfolio-builder/Dockerfile
    restart: unless-stopped
    ports:
      - "8008:8000"
    environment:
      SERVICE_NAME: portfolio-builder
      DATABASE_URL: postgresql+asyncpg://stocker:stocker@postgres:5432/stocker
      REDIS_URL: redis://redis:6379/0
      STRATEGY_CONFIG_PATH: /app/strategies/quality_core_v1.yaml
      ARTIFACTS_PATH: /artifacts
    volumes:
      - ./artifacts:/artifacts
      - ./strategies:/app/strategies:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      CUDA_VISIBLE_DEVICES: ""
      HIP_VISIBLE_DEVICES: ""
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_NO_GPU: "1"
    entrypoint: ["sh", "-c", "ollama pull ${OLLAMA_MODEL:-qwen2.5:14b}"]
    depends_on:
      ollama:
        condition: service_healthy

  llm-vetter:
    build:
      context: .
      dockerfile: services/llm-vetter/Dockerfile
    restart: unless-stopped
    ports:
      - "8016:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://stocker:stocker@postgres:5432/stocker
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:14b}
      AV_API_KEY: ${AV_API_KEY:-demo}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      VET_CANDIDATE_COUNT: ${VET_CANDIDATE_COUNT:-50}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  alpaca-sync:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
    restart: unless-stopped
    ports:
      - "8009:8000"
    environment:
      SERVICE_NAME: alpaca-sync

  intraday-monitor:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      SERVICE_NAME: intraday-monitor

  risk-service:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
    restart: unless-stopped
    ports:
      - "8011:8000"
    environment:
      SERVICE_NAME: risk-service

  trade-executor:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
    restart: unless-stopped
    ports:
      - "8012:8000"
    environment:
      SERVICE_NAME: trade-executor

  backtester:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
    restart: unless-stopped
    ports:
      - "8013:8000"
    environment:
      SERVICE_NAME: backtester

  evaluator:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
    restart: unless-stopped
    ports:
      - "8014:8000"
    environment:
      SERVICE_NAME: evaluator

  scheduler:
    build:
      context: .
      dockerfile: services/stub/Dockerfile
    restart: unless-stopped
    ports:
      - "8015:8000"
    environment:
      SERVICE_NAME: scheduler

volumes:
  postgres_data:
  redis_data:
  ollama_models:
