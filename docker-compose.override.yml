# docker-compose.override.yml — DEV/NAS bind-mounts for fast iteration.
#
# Compose auto-merges this file into docker-compose.yml on every `docker compose`
# command, bind-mounting each service's source over the code baked into its image.
# Effect: a CODE change (service OR shared/) or a new MIGRATION needs only
# `git pull` + a restart/re-run of the service — NO image rebuild. shared/ is
# mounted into every base-derived service and stocker-base installs it editable
# (`pip install -e /shared/`), so shared edits are picked up live too.
#
#   Code change:   git pull && docker compose restart <service>
#   shared change: git pull && docker compose restart <affected services>
#   New migration: git pull && docker compose up -d --force-recreate db-migrator
#
# What this does NOT cover (these still require a rebuild):
#   - new pip dependencies (requirements.txt, or new deps in shared/pyproject.toml)
#       -> docker compose build <service>   (and rebuild stocker-base for shared deps)
#   - adding a brand-new module file under shared/ (editable finder caches the file
#       list) -> rebuild stocker-base. Editing existing shared files is live.
#
# NOTE: shared/ is imported by every service, so a syntax error there breaks ALL
# services on their next restart — higher blast radius than a single-service edit.
#
# Bypass for a clean, immutable deploy (ignore this file):
#   docker compose -f docker-compose.yml up -d --build
# Revert entirely: delete this file.
#
# Note: uvicorn does not hot-reload, so a `restart` is still needed to load new
# code. Volume merge is additive — existing mounts (./strategies, ./artifacts)
# defined in docker-compose.yml are preserved.

services:
  db-migrator:
    volumes:
      - ./db/migrations:/app/db/migrations
      - ./alembic.ini:/app/alembic.ini:ro

  api:
    volumes:
      - ./shared:/shared
      - ./services/api/app:/app/app

  av-ingestor:
    volumes:
      - ./shared:/shared
      - ./services/av-ingestor/app:/app/app

  pipeline:
    volumes:
      - ./shared:/shared
      - ./services/pipeline/app:/app/app

  strategy-validator:
