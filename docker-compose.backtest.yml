# Backtester stack — runs ONLY on the separate backtest machine.
#
#   docker compose -f docker-compose.backtest.yml up -d
#
# This file is NEVER used by the live trading host. It has its OWN Postgres
# (bt-postgres), its own services, its own ports. There is no shared database,
# container, or network with the live stack — running this cannot disrupt the
# trading pipeline in any way. Same git repo, separate deploy target.
#
# Provision before first run:
#   - SHARADAR_API_KEY  (Nasdaq Data Link "Sharadar Equity Bundle")
#   - enough disk for bt-postgres (SF1 + SEP backfill is multi-GB)
# Without SHARADAR_API_KEY the bt-data service runs in MOCK mode (BT_MOCK_DATA),
# so the stack is exercisable end-to-end before the subscription is live.

# Own compose PROJECT NAME: co-locating this stack on the live host (e.g. a
# dormant pre-subscription deploy) must not share the default directory-derived
# project with the live compose — otherwise `docker compose down --remove-orphans`
# on either file would evict the other's containers.
name: stocker-bt

services:

  bt-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: btuser
      POSTGRES_PASSWORD: ${BT_POSTGRES_PASSWORD:-btpass}
      POSTGRES_DB: backtest
    volumes:
      - bt_pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"   # distinct host port from the live DB (5433)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U btuser -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  bt-data:
    build:
      context: .
      dockerfile: services/bt-data/Dockerfile
    restart: unless-stopped
    ports:
      - "8030:8000"
    environment:
      BT_DATABASE_URL: postgresql+asyncpg://btuser:${BT_POSTGRES_PASSWORD:-btpass}@bt-postgres:5432/backtest
      SHARADAR_API_KEY: ${SHARADAR_API_KEY:-}
      BT_MOCK_DATA: ${BT_MOCK_DATA:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      bt-postgres:
        condition: service_healthy

  bt-engine:
    build:
      context: .
      dockerfile: services/bt-engine/Dockerfile
    restart: unless-stopped
    ports:
      - "8031:8000"
    environment:
      BT_DATABASE_URL: postgresql+asyncpg://btuser:${BT_POSTGRES_PASSWORD:-btpass}@bt-postgres:5432/backtest
      STRATEGY_CONFIG_PATH: /strategies/momentum_rotation_v2.yaml
      STALE_BT_RUN_HOURS: ${STALE_BT_RUN_HOURS:-12}
    volumes:
      - ./strategies:/strategies:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      bt-postgres:
        condition: service_healthy

  bt-scheduler:
    build:
      context: .
      dockerfile: services/bt-scheduler/Dockerfile
    restart: unless-stopped
    ports:
      - "8032:8000"
    environment:
      BT_DATA_URL: http://bt-data:8000
      BT_ENGINE_URL: http://bt-engine:8000
      ARTIFACTS_PATH: /artifacts
      STANDING_SWEEP_SPEC: /sweeps/standing_sweep.json
      BT_SCHED_TICK_SECS: ${BT_SCHED_TICK_SECS:-300}
      BT_TOPUP_HOUR: ${BT_TOPUP_HOUR:-23}
      BT_SWEEP_WEEKDAY: ${BT_SWEEP_WEEKDAY:-4}   # Fri=4, 19:00 ET (Sat 02:00 Helsinki) — exports BEFORE the Sat ~00-01 ET (07-08 Helsinki) weekend review
      BT_SWEEP_HOUR: ${BT_SWEEP_HOUR:-19}
      # Phase 6c daily full-config experiment lane (+ one-time auto-baseline):
      # fires at/after this local hour (22 ET = 7pm PT), one at a time, capped
      # per ISO week. See docs/backtester-v2-plan.md "Phase 6c".
      BT_EXPERIMENT_HOUR: ${BT_EXPERIMENT_HOUR:-22}
      BT_EXPERIMENTS_PER_WEEK: ${BT_EXPERIMENTS_PER_WEEK:-5}
      # Skip-if-unchanged: on the due day the sweep fires only if the spec hash
      # changed, evaluator proposals are pending, or this many days passed since
      # the last fire (the monthly refresh that keeps windows sliding).
      BT_SWEEP_FORCE_REFRESH_DAYS: ${BT_SWEEP_FORCE_REFRESH_DAYS:-28}
      SCHEDULE_TZ: America/New_York
    volumes:
      # Results bridge: co-located deploys share ./artifacts with the live stack,
      # so the evaluator's packet reads artifacts/bt/latest_sweep.json directly.
      # Separate-machine deploys copy that one file across (rsync/scp/manual).
      - ./artifacts:/artifacts
      - ./sweeps:/sweeps:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      bt-postgres:
        condition: service_healthy

  # bt-ui is added in Phase 3.

volumes:
  bt_pgdata:
